<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hotseat Voice Game</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./scene.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="gamebar">
        <div>
          <p class="eyebrow" id="gameKind">Synthetic voice game</p>
          <h1 id="gameTitle">YC Interview</h1>
        </div>
        <div class="controls" aria-label="Replay controls">
          <button id="prevTurn" type="button" aria-label="Previous turn">Prev</button>
          <button id="playToggle" type="button" aria-label="Pause replay">Pause</button>
          <button id="nextTurn" type="button" aria-label="Next turn">Next</button>
          <label class="file-button" for="runFile">Load run</label>
          <input id="runFile" type="file" accept="application/json,.json" />
        </div>
      </header>

      <section class="scene speaking-right" id="scene" aria-label="Voice game scene">
        <div class="speaker-tag left" id="leftTag">
          <span class="speaker-light"></span>
          <span id="leftName">Founder</span>
        </div>
        <div class="speaker-tag right" id="rightTag">
          <span id="rightName">YC Partner</span>
          <span class="speaker-light"></span>
        </div>

        <svg class="scene-art" viewBox="0 0 960 520" role="img" aria-label="Two speakers in conversation">
          <defs>
            <linearGradient id="desk" x1="0" x2="1">
              <stop offset="0%" stop-color="#87593a" />
              <stop offset="100%" stop-color="#bd8154" />
            </linearGradient>
          </defs>

          <rect x="0" y="0" width="960" height="520" fill="#a9d6e8" />
          <rect x="106" y="118" width="278" height="142" rx="10" fill="rgba(255,255,255,.22)" />
          <rect x="572" y="104" width="278" height="156" rx="10" fill="rgba(255,255,255,.18)" />
          <path d="M0 326 C160 292 284 302 438 324 S732 354 960 304 V520 H0 Z" fill="#88b777" />
          <path d="M0 326 C160 292 284 302 438 324 S732 354 960 304 V372 H0 Z" fill="rgba(255,255,255,.18)" />

          <g class="desk-group">
            <rect x="225" y="292" width="510" height="58" rx="8" fill="url(#desk)" stroke="#1f2328" stroke-width="4" />
            <rect x="356" y="252" width="158" height="98" rx="8" fill="#30343b" stroke="#1f2328" stroke-width="5" />
            <rect x="374" y="270" width="122" height="58" rx="4" fill="#d5eff7" />
            <rect x="525" y="272" width="120" height="78" rx="8" fill="#f7f8f8" stroke="#1f2328" stroke-width="4" />
            <path d="M558 326 h54" stroke="#1f2328" stroke-width="5" stroke-linecap="round" />
            <path d="M568 306 h34" stroke="#1f2328" stroke-width="5" stroke-linecap="round" />
          </g>

          <g class="avatar avatar-left" transform="translate(206 118)">
            <path d="M61 218 C44 274 32 304 24 362 H186 C172 301 160 266 140 216 Z" fill="#516ccf" stroke="#1f2328" stroke-width="6" />
            <path d="M55 220 C34 242 24 272 18 309" fill="none" stroke="#1f2328" stroke-width="13" stroke-linecap="round" />
            <path d="M145 218 C170 241 181 272 188 308" fill="none" stroke="#1f2328" stroke-width="13" stroke-linecap="round" />
            <circle cx="103" cy="108" r="82" fill="#f4bd80" stroke="#1f2328" stroke-width="6" />
            <path d="M36 106 C42 46 78 22 132 29 C172 35 194 66 185 108 C145 86 92 82 36 106 Z" fill="#543a34" stroke="#1f2328" stroke-width="6" />
            <circle class="blink" cx="76" cy="116" r="8" fill="#1f2328" />
            <circle class="blink" cx="129" cy="116" r="8" fill="#1f2328" />
            <path class="mouth-closed" d="M85 152 Q104 162 123 152" fill="none" stroke="#1f2328" stroke-width="6" stroke-linecap="round" />
            <ellipse class="mouth-open" cx="104" cy="151" rx="20" ry="13" fill="#6b2827" stroke="#1f2328" stroke-width="4" />
            <ellipse class="mouth-wide" cx="104" cy="151" rx="30" ry="9" fill="#6b2827" stroke="#1f2328" stroke-width="4" />
          </g>

          <g class="avatar avatar-right" transform="translate(600 118)">
            <path d="M58 218 C40 274 30 304 22 362 H184 C171 301 159 266 139 216 Z" fill="#48a56c" stroke="#1f2328" stroke-width="6" />
            <path d="M53 220 C32 242 22 272 18 309" fill="none" stroke="#1f2328" stroke-width="13" stroke-linecap="round" />
            <path d="M144 218 C170 241 181 272 188 308" fill="none" stroke="#1f2328" stroke-width="13" stroke-linecap="round" />
            <circle cx="103" cy="108" r="82" fill="#d99f73" stroke="#1f2328" stroke-width="6" />
            <path d="M34 96 C44 46 84 24 132 32 C172 39 194 66 184 110 C148 78 92 76 34 96 Z" fill="#20232c" stroke="#1f2328" stroke-width="6" />
            <rect x="48" y="106" width="46" height="24" rx="8" fill="none" stroke="#1f2328" stroke-width="5" />
            <rect x="119" y="106" width="46" height="24" rx="8" fill="none" stroke="#1f2328" stroke-width="5" />
            <path d="M94 118 H119" stroke="#1f2328" stroke-width="5" />
            <circle class="blink" cx="72" cy="118" r="5" fill="#1f2328" />
            <circle class="blink" cx="142" cy="118" r="5" fill="#1f2328" />
            <path class="mouth-closed" d="M84 153 Q103 162 123 153" fill="none" stroke="#1f2328" stroke-width="6" stroke-linecap="round" />
            <ellipse class="mouth-open" cx="104" cy="153" rx="20" ry="13" fill="#6b2827" stroke="#1f2328" stroke-width="4" />
            <ellipse class="mouth-wide" cx="104" cy="153" rx="30" ry="9" fill="#6b2827" stroke="#1f2328" stroke-width="4" />
          </g>
        </svg>

        <section class="dialogue" aria-live="polite">
          <div class="dialogue-name" id="speakerName">YC Partner</div>
          <p class="dialogue-text" id="dialogueText">
            Welcome. Start simple: who has this problem, and why do they need it now?
          </p>
        </section>
      </section>
    </main>

    <script src="./scene.js"></script>
  </body>
</html>
